<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pitch Perfect — Ear Training</title>
  <style>
    /* ── THEMES ────────────────────────────────────────────────────────────── */
    :root {
      --bg:          #0d0d1a;
      --surface:     #1a1a2e;
      --surface2:    #252540;
      --accent:      #4fc3f7;
      --accent2:     #81c784;
      --accent3:     #ff8a65;
      --text:        #e8e8f0;
      --text-muted:  #8888aa;
      --border:      #333355;
      --font:        'Segoe UI', system-ui, sans-serif;
      --radius:      12px;
    }
    .child-mode {
      --bg:         #0e0320;
      --surface:    #1e0a3c;
      --surface2:   #2e1458;
      --accent:     #ff6eb4;
      --accent2:    #69ff47;
      --accent3:    #ffcc02;
      --text:       #ffffff;
      --text-muted: #cc99ee;
      --border:     #5533aa;
      --font:       'Comic Sans MS', 'Chalkboard SE', cursive;
      --radius:     20px;
    }

    /* ── BASE ───────────────────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100dvh;
      transition: background 0.3s, color 0.3s;
    }
    .app {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 16px 100px;
    }

    /* ── HEADER ─────────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 20;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .header-logo { font-size: 1.15rem; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      width: 38px; height: 38px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .icon-btn:hover { border-color: var(--accent); background: var(--surface2); }

    /* ── JOURNEY MAP ────────────────────────────────────────────────────────── */
    .phase-section { margin: 20px 0; }
    .phase-header {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 0 2px;
      margin-bottom: 12px;
    }
    .phase-badge {
      background: var(--accent);
      color: var(--bg);
      font-size: 0.7rem;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 100px;
      margin-top: 3px;
      white-space: nowrap;
    }
    .phase-name { font-size: 1rem; font-weight: 700; }
    .phase-sub  { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

    .lesson-list { display: flex; flex-direction: column; gap: 8px; }
    .lesson-node {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 15px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      user-select: none;
    }
    .lesson-node:hover:not(.locked) { border-color: var(--accent); background: var(--surface2); transform: translateY(-1px); }
    .lesson-node.locked { opacity: 0.4; cursor: not-allowed; }
    .lesson-node.done  { border-color: var(--accent2); }
    .lesson-node.active { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent); }

    .node-icon {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
      background: var(--surface2); border: 2px solid var(--border);
    }
    .lesson-node.done  .node-icon { border-color: var(--accent2); background: color-mix(in srgb, var(--accent2) 15%, transparent); }
    .lesson-node.active .node-icon { border-color: var(--accent);  background: color-mix(in srgb, var(--accent)  15%, transparent); }

    .node-info { flex: 1; min-width: 0; }
    .node-title    { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .node-subtitle { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
    .node-stars    { font-size: 0.9rem; letter-spacing: 1px; }

    /* ── LESSON VIEW ────────────────────────────────────────────────────────── */
    .lesson-view { padding-top: 6px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .back-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .back-btn {
      background: none; border: none; color: var(--accent);
      font-family: var(--font); font-size: 0.9rem; cursor: pointer;
      display: flex; align-items: center; gap: 6px; padding: 4px 0;
    }
    .phase-crumb { font-size: 0.78rem; color: var(--text-muted); }

    .lesson-title    { font-size: 1.5rem; font-weight: 800; margin-bottom: 3px; }
    .lesson-subtitle { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 16px; }
    .lesson-desc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 15px;
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    /* Note card(s) */
    .note-cards { display: flex; gap: 10px; margin-bottom: 18px; }
    .note-card {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 10px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .note-card.target { border-color: var(--accent); }
    .note-card.done   { border-color: var(--accent2); }
    .note-letter { font-size: 3.4rem; font-weight: 900; color: var(--accent); line-height: 1; }
    .note-card.done .note-letter { color: var(--accent2); }
    .note-sol   { font-size: 1rem; color: var(--text-muted); margin-top: 3px; }
    .note-freq  { font-size: 0.72rem; color: var(--text-muted); margin-top: 4px; font-family: monospace; }

    /* Step indicator (interval lessons) */
    .step-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 14px; }
    .step-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--border); transition: background 0.2s;
    }
    .step-dot.active { background: var(--accent); }
    .step-dot.done   { background: var(--accent2); }

    /* Buttons */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px 20px; border-radius: var(--radius);
      font-family: var(--font); font-size: 1rem; font-weight: 700;
      cursor: pointer; border: none;
      transition: filter 0.15s, transform 0.1s;
      margin-bottom: 10px;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary   { background: var(--accent);  color: var(--bg); }
    .btn-primary:hover:not(:disabled)  { filter: brightness(1.12); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }
    .btn-success   { background: var(--accent2); color: #000; }
    .btn-success:hover:not(:disabled)  { filter: brightness(1.08); }
    .btn-danger    { background: #c62828; color: #fff; }

    /* Pitch meter */
    .pitch-section { margin-bottom: 16px; }
    .pitch-label { font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.07em; }
    #pitchCanvas  { display: block; width: 100%; height: 90px; border-radius: var(--radius); background: var(--surface); }
    #keyboardCanvas { display: block; width: 100%; height: 120px; border-radius: var(--radius); margin-bottom: 18px; background: var(--surface); }

    /* Hold bar */
    .hold-track { height: 6px; background: var(--surface2); border-radius: 3px; margin-bottom: 10px; overflow: hidden; }
    .hold-fill  { height: 100%; background: var(--accent2); border-radius: 3px; width: 0%; transition: width 0.08s linear; }

    /* Feedback */
    .feedback {
      text-align: center; font-size: 0.95rem; font-weight: 600;
      padding: 11px; border-radius: var(--radius); margin-bottom: 12px;
      min-height: 46px; display: flex; align-items: center; justify-content: center;
    }
    .feedback.good    { background: color-mix(in srgb, var(--accent2) 15%, transparent); color: var(--accent2); }
    .feedback.neutral { background: var(--surface2); color: var(--text-muted); }
    .feedback.bad     { background: color-mix(in srgb, #ff5252 12%, transparent); color: #ff7777; }

    /* Theory panel */
    .theory-toggle {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      font-family: var(--font); font-size: 0.84rem; padding: 8px 14px;
      border-radius: var(--radius); cursor: pointer; width: 100%; margin-bottom: 8px;
      transition: border-color 0.2s, color 0.2s;
    }
    .theory-toggle:hover { border-color: var(--accent); color: var(--text); }
    .theory-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; display: none;
      margin-bottom: 16px; font-size: 0.87rem; line-height: 1.7;
    }
    .theory-panel.open { display: block; }
    .theory-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .theory-row:last-child { border-bottom: none; }
    .th-key { color: var(--text-muted); }
    .th-val { font-weight: 700; color: var(--accent); }
    .theory-note { font-size: 0.84rem; color: var(--text-muted); margin-top: 10px; line-height: 1.6; }

    /* Result overlay */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 24px;
      animation: fadeIn 0.2s ease;
    }
    .result-card {
      background: var(--surface);
      border: 2px solid var(--accent2);
      border-radius: var(--radius);
      padding: 30px 22px;
      text-align: center;
      max-width: 360px; width: 100%;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .result-emoji  { font-size: 3.5rem; margin-bottom: 10px; }
    .result-title  { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
    .result-sub    { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 18px; }
    .result-stars  { font-size: 2rem; margin-bottom: 20px; letter-spacing: 4px; }

    /* Settings sheet */
    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 200;
    }
    .sheet {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 22px 20px 40px;
      width: 100%; max-width: 560px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-title {
      font-size: 1rem; font-weight: 800; margin-bottom: 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .sheet-close { background: none; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; }
    .setting-row { margin-bottom: 18px; }
    .setting-label { font-size: 0.76rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; }
    .toggle-group { display: flex; background: var(--surface2); border-radius: var(--radius); padding: 4px; gap: 4px; }
    .tog {
      flex: 1; background: none; border: none; color: var(--text-muted);
      padding: 8px 10px; border-radius: calc(var(--radius) - 4px);
      cursor: pointer; font-family: var(--font); font-size: 0.88rem; font-weight: 600;
      transition: background 0.2s, color 0.2s;
    }
    .tog.active { background: var(--accent); color: var(--bg); }
    .danger-zone { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
